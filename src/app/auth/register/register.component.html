<div class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h1>Crea tu cuenta</h1>
      <p>Completa tus datos para empezar</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-scroll-container">
        <!-- Sección 1: Información Personal -->
        <div class="form-section">
          <h2 class="section-title">Información Personal</h2>
          <div class="form-row">
            <div class="form-group half">
              <label for="name">Nombre Completo</label>
              <input type="text" id="name" formControlName="name" class="form-control" placeholder="Ej: Juan Pérez">
              <small *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid" class="error-text">Min. 3 caracteres</small>
            </div>
            <div class="form-group half">
              <label for="identification">Identificación</label>
              <input type="text" id="identification" formControlName="identification" class="form-control" placeholder="Ej: 1234567890">
              <small *ngIf="registerForm.get('identification')?.touched && registerForm.get('identification')?.invalid" class="error-text">10-13 dígitos</small>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label for="gender">Género</label>
              <select id="gender" formControlName="gender" class="form-control">
                <option value="MALE">Masculino</option>
                <option value="FEMALE">Femenino</option>
                <option value="OTHER">Otro</option>
              </select>
            </div>
            <div class="form-group half">
              <label for="age">Edad</label>
              <input type="number" id="age" formControlName="age" class="form-control">
              <small *ngIf="registerForm.get('age')?.touched && registerForm.get('age')?.invalid" class="error-text">Min. 18 años</small>
            </div>
          </div>
        </div>

        <!-- Sección 2: Contacto -->
        <div class="form-section">
          <h2 class="section-title">Información de Contacto</h2>
          <div class="form-row">
            <div class="form-group half">
              <label for="email">Email</label>
              <input type="email" id="email" formControlName="email" class="form-control" placeholder="ejemplo@correo.com">
              <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" class="error-text">Email inválido</small>
            </div>
            <div class="form-group half">
              <label for="phone">Teléfono</label>
              <input type="text" id="phone" formControlName="phone" class="form-control" placeholder="Ej: 0998877665">
              <small *ngIf="registerForm.get('phone')?.touched && registerForm.get('phone')?.invalid" class="error-text">10 dígitos</small>
            </div>
          </div>

          <div class="form-group">
            <label for="address">Dirección de Domicilio</label>
            <input type="text" id="address" formControlName="address" class="form-control" placeholder="Ej: Av. Principal 123, Edif. Apto 4B">
            <small *ngIf="registerForm.get('address')?.touched && registerForm.get('address')?.invalid" class="error-text">Min. 5 caracteres</small>
          </div>
        </div>

        <!-- Sección 3: Seguridad -->
        <div class="form-section">
          <h2 class="section-title">Seguridad</h2>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" formControlName="password" class="form-control" placeholder="Crea una contraseña segura (Min. 6 caracteres)">
            <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" class="error-text">Min. 6 caracteres</small>
          </div>
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        {{ successMessage }}
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="registerForm.invalid || isLoading" class="btn-primary full-width">
          {{ isLoading ? 'Procesando...' : 'Registrarse' }}
        </button>
      </div>
    </form>

    <div class="register-footer">
      <span>¿Ya tienes cuenta?</span>
      <a routerLink="/login">Inicia sesión</a>
    </div>
  </div>
</div>
