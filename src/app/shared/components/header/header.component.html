<header class="header">
  <nav class="header__nav">
    <div class="header__left">
      <button class="header__btn header__toggle material-icons" (click)="onToggleSidebar()">
        menu
      </button>
      <a href="/" class="header__logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="currentColor"/>
          </svg>
        </div>
        <span class="header__logo-text">Bank</span>
      </a>
    </div>

    <div class="header__right">
      <div class="header__profile">
        <div class="avatar">
          <span class="avatar__text">{{ username.charAt(0) || 'U' }}</span>
        </div>
        <span class="header__username hidden-mobile">
          {{ username }}
        </span>
      </div>

      <div class="header__divider"></div>

      <button class="header__btn header__logout" (click)="logoutAccount()" title="Cerrar sesión">
        <span class="material-icons">logout</span>
        <span class="hidden-mobile">Salir</span>
      </button>
    </div>
  </nav>
</header>
