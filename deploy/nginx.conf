server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Basic gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

    # Keep HTML non-cached to pick up new deploys quickly
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # Static assets can be cached aggressively
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Angular router fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
