version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: ays-shl-account-management:staging
    container_name: ays-shl-account-management-staging
    restart: unless-stopped
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
